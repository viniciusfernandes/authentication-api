server:
  port: ${AUTH_SERVER_PORT:8080}

logging:
  level:
    root: INFO

spring:
  application:
    name: authentication-api
  datasource:
    url: {}
    username: car
    password: car
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  threads:
    virtual:
      enabled: true

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

app:
  frontend-url: ${FRONTEND_URL}
  email-verification-token-expiry: 86400000 # 24 hours
  password-reset-token-expiry: 3600000 # 1 hour
  email-verification-enabled: false
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}

email-service:
  enable: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      show-components: never
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: oauth
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope: email,public_profile